name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag -s v0.1.0 -m "PerfBuddy 0.1.0" && git push origin v0.1.0
# This builds and tests on Linux, macOS, and Windows, bundles the Qt runtime
# with the GUI so it runs without a system Qt install, and publishes the
# per-platform archives to a GitHub Release for that tag.
#
# It can also be run via "Run workflow" (workflow_dispatch) to build and upload
# the artifacts WITHOUT publishing a release — handy for validating packaging.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DPERFBUDDY_BUILD_GUI=ON
          -DPERFBUDDY_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release

      - name: Stage install tree
        run: cmake --install build --config Release --prefix dist

      # ---- Bundle the Qt runtime with the GUI, per platform ----

      - name: Bundle Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          # macdeployqt copies the Qt frameworks/plugins into the .app and
          # rewrites linkage. Its trailing codesign+verify step fails without a
          # signing certificate, so tolerate a non-zero exit, then ad-hoc sign
          # ourselves (required for the app to launch on Apple Silicon) and
          # assert the frameworks actually landed.
          macdeployqt dist/perfbuddy-gui.app -verbose=1 || echo "macdeployqt exit $? (codesign step expected to fail unsigned)"
          codesign --force --deep --sign - dist/perfbuddy-gui.app
          test -d dist/perfbuddy-gui.app/Contents/Frameworks/QtCore.framework

      - name: Bundle Qt (Windows)
        if: runner.os == 'Windows'
        run: |
          # windeployqt drops the Qt DLLs and plugins next to the .exe in bin/,
          # so the whole dist/bin folder is self-contained.
          windeployqt --release --no-translations dist/bin/perfbuddy-gui.exe
          if (-not (Test-Path dist/bin/Qt6Core.dll)) { throw "windeployqt did not bundle Qt6Core.dll" }

      - name: Bundle Qt (Linux, AppImage)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          # Headless CI has no FUSE; tell the AppImage tooling to self-extract.
          export APPIMAGE_EXTRACT_AND_RUN=1
          # Let linuxdeploy-plugin-qt locate Qt.
          export QMAKE="$QT_ROOT_DIR/bin/qmake"

          curl -fsSL -o linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o linuxdeploy-plugin-qt.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --executable dist/bin/perfbuddy-gui \
            --desktop-file gui/packaging/perfbuddy-gui.desktop \
            --icon-file gui/packaging/perfbuddy-gui.svg \
            --plugin qt \
            --output appimage

          # The self-contained AppImage replaces the bare (Qt-less) GUI binary.
          rm -f dist/bin/perfbuddy-gui
          mv PerfBuddy*.AppImage dist/perfbuddy-gui-${{ matrix.platform }}.AppImage
          test -f dist/perfbuddy-gui-${{ matrix.platform }}.AppImage

      # ---- Ship docs alongside the binaries ----

      - name: Add docs (Linux/macOS)
        if: runner.os != 'Windows'
        run: cp README.md LICENSE dist/

      - name: Add docs (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item README.md, LICENSE dist/

      # ---- Package ----

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf "perfbuddy-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz" -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/* -DestinationPath "perfbuddy-${{ github.ref_name }}-${{ matrix.platform }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: perfbuddy-${{ matrix.platform }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    # Only publish on an actual tag push; workflow_dispatch just builds artifacts.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # The signing secrets (GPG_PRIVATE_KEY / GPG_PASSPHRASE) live in this
    # environment; without this line the job can't see them and signing is
    # silently skipped.
    environment: default
    permissions:
      contents: write
    env:
      # Optional. If set, the artifacts are GPG-signed; if absent, the release
      # still publishes (unsigned). Prefer exporting a dedicated signing SUBKEY,
      # base64-encoded, so the master key never reaches CI:
      #   gpg --export-secret-subkeys <KEYID>! | base64 | pbcopy
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # SHA256SUMS covers every archive; signing it once (one .asc) lets users
      # verify authenticity and integrity of all downloads with two commands.
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum perfbuddy-* > SHA256SUMS

      - name: Sign checksums (GPG)
        if: env.GPG_PRIVATE_KEY != ''
        working-directory: artifacts
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          # Sign with the (only) imported secret key — gpg auto-selects a
          # signing-capable key, so no fragile key-id parsing is needed.
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS
          gpg --verify SHA256SUMS.asc SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          artifacts/*
          --repo "${{ github.repository }}"
          --title "PerfBuddy ${{ github.ref_name }}"
          --generate-notes
          --verify-tag
