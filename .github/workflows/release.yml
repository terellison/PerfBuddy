name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag -s v0.1.0 -m "PerfBuddy 0.1.0" && git push origin v0.1.0
# This builds and tests the CLI tools on Linux, macOS, and Windows, then
# publishes the per-platform archives to a GitHub Release for that tag.

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DPERFBUDDY_BUILD_GUI=OFF
          -DPERFBUDDY_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release

      - name: Stage install tree
        run: cmake --install build --config Release --prefix dist

      # Ship the license and readme alongside the binaries.
      - name: Add docs (Linux/macOS)
        if: runner.os != 'Windows'
        run: cp README.md LICENSE dist/

      - name: Add docs (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item README.md, LICENSE dist/

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf "perfbuddy-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz" -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/* -DestinationPath "perfbuddy-${{ github.ref_name }}-${{ matrix.platform }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: perfbuddy-${{ matrix.platform }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          artifacts/*
          --repo "${{ github.repository }}"
          --title "PerfBuddy ${{ github.ref_name }}"
          --generate-notes
          --verify-tag
