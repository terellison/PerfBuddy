name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }}${{ matrix.gui && ', GUI' || '' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gui: false
          - os: ubuntu-latest
            gui: true
          - os: macos-latest
            gui: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (Linux GUI leg)
        if: matrix.gui && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DPERFBUDDY_BUILD_GUI=${{ matrix.gui && 'ON' || 'OFF' }}
          -DPERFBUDDY_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure
